name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      # ------------------------------------------------------------------
      # 1. 生成 iOS 工程 (每次从头)
      # ------------------------------------------------------------------
      - name: Add iOS platform (fresh)
        run: npx cap add ios

      # ------------------------------------------------------------------
      # 2. Sanity-check the user-supplied icon/splash sources BEFORE 'cap sync'
      #    bakes them into xcassets.  Fail fast with an obvious message.
      # ------------------------------------------------------------------
      - name: Verify icon & splash source dimensions
        run: |
          python3 -c "
          from PIL import Image, UnidentifiedImageError
          import sys
          targets = {
              'resources/icon.png':     (1024, 1024),
              'resources/splash.png':   (2732, 2732),
          }
          failed = False
          for path, expected in targets.items():
              try:
                  im = Image.open(path)
                  actual = im.size
                  print('  %-28s %dx%d' % (path, actual[0], actual[1]))
              except (FileNotFoundError, UnidentifiedImageError, OSError) as e:
                  print('  %-28s MISSING or UNREADABLE (%s)' % (path, e))
                  failed = True
          sys.exit(1 if failed else 0)
          "

      # ------------------------------------------------------------------
      # 3. 同步 web 资源 + 把 dist 拷贝到 public/
      #    同时让 capacitor 把 resources/icon.png / resources/splash.png
      #    烘焙进 ios/App/App/Assets.xcassets/
      # ------------------------------------------------------------------
      - name: Sync Capacitor
        run: npx cap sync ios

      # ------------------------------------------------------------------
      # 3. 生成 Shared Scheme —— 这是 xcodebuild 的刚性要求
      #    Capacitor 8 + SPM 的模板只把 scheme 放在 xcuserdata/ 下,
      #    CI runner 上看不到, 必须手动创建 xcshareddata/xcschemes/
      # ------------------------------------------------------------------
      - name: Create shared scheme
        run: |
          SCHEMES_DIR="ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEMES_DIR"
          cat > "$SCHEMES_DIR/App.xcscheme" <<'XCSHEME_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1600"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForAnalyzing = "YES"
                      buildForArchiving = "YES"
                      buildForProfiling = "YES"
                      buildForRunning = "YES"
                      buildForTesting = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "504EC3041FED79650016851F"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES"
                shouldAutocreateTestPlan = "YES">
                <Testables>
                </Testables>
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "504EC3041FED79650016851F"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "504EC3041FED79650016851F"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          XCSHEME_EOF

          echo "--- Scheme file created ---"
          ls -la "$SCHEMES_DIR/"
          echo "--- Scheme list reported by xcodebuild ---"
          xcodebuild -project ios/App/App.xcodeproj -list

      # ------------------------------------------------------------------
      # 4. 预拉取 SPM 依赖 (capacitor-swift-pm + 本地 capacitor-splash-screen)
      #    GitHub Actions 默认没有 SSH key 访问 github.com, 必须走 https
      #    所以显式传递 -scmProvider system 让 xcodebuild 自己 git clone
      # ------------------------------------------------------------------
      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -scmProvider system \
            -derivedDataPath ios/App/DerivedData

      # ------------------------------------------------------------------
      # 5. Info.plist 定制（在 archive 之前, 这些值会烘焙进 .app）
      # ------------------------------------------------------------------
      - name: Update Info.plist
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Boxuezhe" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Boxuezhe" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSExceptionAllowsInsecureHTTPLoads bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSIncludesSubdomains bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PLIST"

      # ------------------------------------------------------------------
      # 6. Archive —— unsigned
      # ------------------------------------------------------------------
      - name: Archive (build) unsigned
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -scmProvider system \
            -derivedDataPath ios/App/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # ------------------------------------------------------------------
      # 7. 打 .ipa
      # ------------------------------------------------------------------
      - name: Package .ipa
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
                "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r boschue-unsigned.ipa Payload
          echo "--- IPA contents ---"
          unzip -l boschue-unsigned.ipa | head -30
          echo "--- Done ---"

      # ------------------------------------------------------------------
      # 8. 上传
      # ------------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boschue-ios
          path: ${{ runner.temp }}/ipa/
          retention-days: 30
