name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  APP_NAME: Boxuezhe
  BUNDLE_ID: com.boxuezhe.app
  IOS_DEPLOYMENT_TARGET: '17.0'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web project
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Copy pre-built icons and splash
        run: |
          cp -R resources/ios/AppIcon.appiconset ios/App/App/Assets.xcassets/
          cp -R resources/ios/Splash.imageset ios/App/App/Assets.xcassets/

      - name: Inject Info.plist config
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Boxuezhe" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Boxuezhe" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSExceptionAllowsInsecureHTTPLoads bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSIncludesSubdomains bool true" "$PLIST" 2>/dev/null || true

          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"

          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PLIST"

      - name: Configure code signing (optional)
        if: ${{ vars.IOS_CODE_SIGNING == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA
        if: ${{ vars.IOS_CODE_SIGNING == 'true' }}
        run: |
          cd ios/App
          xcodebuild archive \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}" \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Build unsigned IPA (AltStore / Sideloadly)
        if: ${{ vars.IOS_CODE_SIGNING != 'true' }}
        id: build
        continue-on-error: true
        run: |
          cd ios/App

          echo "=== XCODE VERSION ==="
          xcodebuild -version
          echo

          echo "=== SDK PATH ==="
          xcrun --show-sdk-path --sdk iphoneos 2>&1
          echo

          echo "=== CAP SYNC OUTPUT ==="
          ls -la .
          ls -la Pods 2>/dev/null || echo "No Pods folder"

          echo "=== SCHEMES ==="
          xcodebuild -list 2>&1
          echo

          echo "=== BUILD SETTINGS (first 50 relevant lines) ==="
          xcodebuild -scheme App -configuration Release -showBuildSettings 2>&1 | grep -E "PRODUCT_BUNDLE|SDKROOT|DEPLOY|CODE_SIGN" | head -50
          echo

          echo "=== START BUILD ==="
          xcodebuild build \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath $RUNNER_TEMP/dd \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee $RUNNER_TEMP/build.log | tail -100
          echo

          echo "=== FINDING APP ==="
          find $RUNNER_TEMP/dd -name "App.app" -type d 2>/dev/null | head -5
          echo

          echo "=== LOG TAIL (last 200 lines) ==="
          tail -200 $RUNNER_TEMP/build.log

      - name: Package IPA
        if: ${{ vars.IOS_CODE_SIGNING != 'true' && steps.build.outcome == 'success' }}
        run: |
          APP_PATH=$(find $RUNNER_TEMP/dd -name "App.app" -type d | head -1)
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/ipa/Payload/App.app
          cd $RUNNER_TEMP/ipa
          zip -r boschue-unsigned.ipa Payload
          ls -la

      - name: Upload build artifact
        if: ${{ hashFiles(format('{0}/ipa/*.ipa', runner.temp)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: boschue-ios
          path: ${{ runner.temp }}/ipa/
          retention-days: 30

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}