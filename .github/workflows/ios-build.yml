name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  APP_NAME: 博学者
  BUNDLE_ID: com.boxuezhe.app
  IOS_DEPLOYMENT_TARGET: '17.0'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web project
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Ensure CocoaPods available
        run: |
          if ! command -v pod &>/dev/null; then
            brew install cocoapods
          fi
          pod --version

      - name: Copy pre-built icons
        run: |
          cp -R resources/ios/AppIcon.appiconset ios/App/App/Assets.xcassets/
          cp -R resources/ios/Splash.imageset ios/App/App/Assets.xcassets/

      - name: Sync Capacitor (generates Podfile + runs pod install)
        run: npx cap sync ios

      - name: Inject Info.plist config (ATS + Display Name + Orientation)
        run: |
          PLIST="ios/App/App/Info.plist"
          echo "=== Before ==="; cat "$PLIST" 2>/dev/null || true

          # 设置 App 显示名称
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 博学者" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 博学者" "$PLIST"

          # 配置 ATS 绕过 124.222.199.117 明文 HTTP
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSExceptionAllowsInsecureHTTPLoads bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:124.222.199.117:NSIncludesSubdomains bool true" "$PLIST" 2>/dev/null || true

          # 锁定竖屏（删除其他方向）
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"

          # iPad 方向也锁定
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PLIST"

          echo "=== After ==="; cat "$PLIST"

      - name: Configure code signing (optional)
        if: ${{ vars.IOS_CODE_SIGNING == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA
        if: ${{ vars.IOS_CODE_SIGNING == 'true' }}
        run: |
          cd ios/App
          xcodebuild archive \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}" \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Build unsigned IPA (install via AltStore / Sideloadly)
        if: ${{ vars.IOS_CODE_SIGNING != 'true' }}
        run: |
          cd ios/App
          # 用通用 iOS SDK 编译（不是 iphonesimulator，才能装到真机）
          xcodebuild archive \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # 手动打包成 .ipa 文件
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -R $RUNNER_TEMP/App.xcarchive/Products/Applications/App.app $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r boschue-unsigned.ipa Payload
          ls -la

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: boschue-ios
          path: ${{ runner.temp }}/ipa/
          retention-days: 30

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
